<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIGN UP PAGE</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      animation: fadeInUp 0.5s ease both;
    }
    .signup-card {
      width: 100%;
      max-width: 450px;
    }
    .signup-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .signup-header h1 {
      font-family: 'Fraunces', serif;
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .signup-header p {
      color: var(--text2);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text);
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-row {
      display: flex;
      gap: 16px;
    }
    .form-row .form-group {
      flex: 1;
    }
    .save-btn {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .save-btn:hover {
      background: var(--primary-dark);
    }
    .form-footer {
      text-align: center;
      margin-top: 24px;
      color: var(--text2);
    }
    .form-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .form-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>


<div id="splash" class="splash-screen">
  <div class="splash-content">
    <div class="splash-logo">
      <span class="splash-icon">🛍️</span>
      <h1 class="splash-title">Shop<em>ify</em></h1>
    </div>
    <div class="splash-loader">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
    <p class="splash-tagline">Loading your shopping experience...</p>
  </div>
  <div class="splash-particles">
    <span class="particle">✨</span>
    <span class="particle">🛍️</span>
    <span class="particle">🎁</span>
    <span class="particle">💫</span>
    <span class="particle">🛒</span>
    <span class="particle">⭐</span>
  </div>
</div>


<header>
  <div class="header-inner">
    <div class="header-spacer"></div>
    <a href="index.html" class="logo">Shop<em>ify</em></a>
    <div class="header-spacer"></div>
    <a href="track-order.html" class="icon-btn" title="Track Order" aria-label="Track Order">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
        <line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
    </a>
  </div>
</header>


<main class="main-content">
  <div class="signup-card">
    <div class="signup-header">
      <h1>Create Your Account</h1>
      <p>Join ShopNow and start shopping</p>
    </div>

    <form id="signupForm" onsubmit="handleSignup(event)">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" placeholder="John" required />
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" placeholder="Doe" required />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="+64(0986543469)" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a password" required />
      </div>

      <button type="submit" class="save-btn">Create Account</button>
    </form>

    <div class="form-footer">
      <p>Already have an account? <a href="login.html">Sign In</a></p>
    </div>
  </div>
</main>


<div class="toast" id="toast"></div>


<script src="data.js"></script>
<script src="app.js"></script>

<script>
 
  function handleSignup(event) {
    event.preventDefault();
    
    const firstName = document.getElementById('firstName').value;
    const lastName = document.getElementById('lastName').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const password = document.getElementById('password').value;
    
    if (firstName && lastName && email && password) {
      
      ShopNowDB.createUser(email, firstName + ' ' + lastName, phone);
      
      showToast('🎉 Account created successfully!');
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);
    }
  }
</script>

</body>
</html>
