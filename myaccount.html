<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Page</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .main-content {
      flex: 1;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px;
      width: 100%;
      animation: fadeInUp 0.5s ease both;
    }
  </style>
</head>
<body>


<header>
  <div class="header-inner">
    <a href="index.html" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back
    </a>
    <div class="header-spacer"></div>
    <a href="index.html" class="logo">Shop<em>ify</em></a>
    <div class="header-spacer"></div>
    <a href="track-order.html" class="icon-btn" title="Track Order" aria-label="Track Order">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
        <line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
    </a>
  </div>
</header>


<main class="main-content">
  <div class="page-header">
    <h1>My Account</h1>
    <p>Manage your profile, orders, and preferences</p>
  </div>

  <div class="account-sections">
   
    <div class="account-card">
      <div class="card-header" onclick="toggleCard(this)">
        <div class="card-header-left">
          <div class="card-icon">👤</div>
          <span class="card-title">Profile Information</span>
        </div>
        <div class="card-toggle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6 6-6"/>
          </svg>
        </div>
      </div>
      <div class="card-body open">
        <div class="profile-info">
          <div class="profile-avatar" id="profileAvatar">👤</div>
          <div class="profile-details">
            <h3 id="profileName">Your Name</h3>
            <p id="profileEmail">your@email.com</p>
          </div>
        </div>
        <form class="profile-form" onsubmit="saveProfile(event)">
          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" id="firstName" placeholder="First Name" />
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" id="lastName" placeholder="Last Name" />
            </div>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="profileEmailInput" placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="+63(0472647583)" />
          </div>
          <button type="submit" class="save-btn">Save Changes</button>
        </form>
      </div>
    </div>

    
    <div class="account-card">
      <div class="card-header" onclick="toggleCard(this)">
        <div class="card-header-left">
          <div class="card-icon">📦</div>
          <span class="card-title">Order History</span>
        </div>
        <div class="card-toggle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6 6-6"/>
          </svg>
        </div>
      </div>
      <div class="card-body">
        <div class="order-list" id="orderList">
         
        </div>
      </div>
    </div>

   
    <div class="account-card">
      <div class="card-header" onclick="toggleCard(this)">
        <div class="card-header-left">
          <div class="card-icon">⚙️</div>
          <span class="card-title">Settings</span>
        </div>
        <div class="card-toggle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6 6-6"/>
          </svg>
        </div>
      </div>
      <div class="card-body">
        <div class="settings-list" id="settingsList">
         
        </div>
      </div>
    </div>

   
    <div class="logout-section">
      <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
    </div>
  </div>
</main>


<div class="toast" id="toast"></div>


<script src="data.js"></script>
<script>
  
  if (!ShopNowDB.hasUser()) {
    window.location.href = 'login.html';
  }
</script>


<script src="app.js"></script>

</body>
</html>
